<script>
(function(){
  var grid = document.getElementById('shulGrid');
  var search = document.getElementById('shulSearch');
  var citySelect = document.getElementById('citySelect');
  var all = [];

  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function fmt(iso){
    if(!iso) return '\u2014';
    var d=new Date(iso), h=d.getHours(), m=d.getMinutes(), ap=h>=12?'PM':'AM';
    h=h%12||12; return h+':'+(m<10?'0':'')+m+' '+ap;
  }
  function fmtDate(iso){
    if(!iso) return '';
    return new Date(iso).toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
  }
  function addMinutes(iso, minutes){
    var d = new Date(iso);
    d.setMinutes(d.getMinutes() + minutes);
    return d.toISOString();
  }
  function getNextFriday(){
    var d = new Date();
    var day = d.getDay();
    var daysUntilFri = (5 - day + 7) % 7;
    if(daysUntilFri === 0 && d.getHours() >= 20) daysUntilFri = 7;
    d.setDate(d.getDate() + daysUntilFri);
    return d.toISOString().slice(0,10);
  }
  function getSaturday(fridayStr){
    var d = new Date(fridayStr);
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0,10);
  }

  function loadShabbos(){
    var parts = citySelect.value.split('|');
    var geoId = parts[0];
    var cityName = parts[1];
    ['w_candles','w_early','w_main','w_rt'].forEach(function(id){document.getElementById(id).textContent='\u2014';});
    document.getElementById('widgetDate').textContent = cityName.toUpperCase() + ' \u00B7 LOADING\u2026';

    var friday = getNextFriday();
    var saturday = getSaturday(friday);

    // Candle lighting + parsha from /shabbat
    fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=' + geoId + '&M=on&m=50')
      .then(function(r){return r.json();})
      .then(function(d){
        var items = d.items || [];
        var parsha = items.find(function(i){return i.category==='parashat';});
        var candles = items.find(function(i){return i.category==='candles';});

        if(candles){
          document.getElementById('w_candles').textContent = fmt(candles.date);
          document.getElementById('widgetDate').textContent =
            cityName.toUpperCase() + ' \u00B7 ' + fmtDate(candles.date).toUpperCase();
        }
        if(parsha){
          document.getElementById('parshaName').textContent = parsha.title;
          if(parsha.hebrew) document.getElementById('parshaHeb').textContent = parsha.hebrew;
          var ref = parsha.url || ('https://www.sefaria.org/' + parsha.title.replace(/\s+/g,'_'));
          document.getElementById('parshaLearn').href = ref;
        }
      })
      .catch(function(){});

    // Get Saturday's sunset, calculate 3 havdalah times ourselves
    fetch('https://www.hebcal.com/zmanim?cfg=json&geonameid=' + geoId + '&date=' + saturday)
      .then(function(r){return r.json();})
      .then(function(d){
        var sunset = d.times && d.times.sunset;
        if(!sunset){
          document.getElementById('widgetDate').textContent = cityName.toUpperCase() + ' \u00B7 UNABLE TO LOAD';
          return;
        }
        document.getElementById('w_early').textContent = fmt(addMinutes(sunset, 40));
        document.getElementById('w_main').textContent  = fmt(addMinutes(sunset, 50));
        document.getElementById('w_rt').textContent    = fmt(addMinutes(sunset, 72));
      })
      .catch(function(){
        document.getElementById('widgetDate').textContent = cityName.toUpperCase() + ' \u00B7 UNABLE TO LOAD';
      });
  }
  citySelect.addEventListener('change', loadShabbos);
  loadShabbos();

  // Per-shul Shabbos schedules
  function tefLine(label,arr,ap){
    if(!arr||!arr.length) return '';
    var times=arr.map(function(t){return t+' '+ap;}).join(', ');
    return '<div class="tef"><span>'+label+':</span> '+esc(times)+'</div>';
  }
  function renderShuls(list){
    if(!list.length){grid.innerHTML='<div class="empty">No shuls match your search.</div>';return;}
    grid.innerHTML = list.map(function(s){
      var sh = s.schedule && s.schedule.Shabbos;
      var has = sh && ((sh.shacharis&&sh.shacharis.length)||(sh.mincha&&sh.mincha.length)||(sh.maariv&&sh.maariv.length));
      var html = '<div class="shul-card'+(has?'':' no-times')+'"><h3>'+esc(s.name||'Shul')+'</h3>';
      if(has){
        html += tefLine('Shacharis', sh.shacharis, 'am');
        html += tefLine('Mincha', sh.mincha, 'pm');
        html += tefLine('Maariv', sh.maariv, 'pm');
      } else {
        html += '<div class="tef">Shabbos times not listed on GoDaven.</div>';
      }
      html += '</div>';
      return html;
    }).join('');
  }
  search.addEventListener('input', function(){
    var q = search.value.trim().toLowerCase();
    if(!q) return renderShuls(all);
    renderShuls(all.filter(function(s){return ((s.name||'')+' '+(s.rabbi||'')+' '+(s.address||'')).toLowerCase().indexOf(q)!==-1;}));
  });

  fetch('/data/shuls.json?d='+new Date().toISOString().slice(0,10))
    .then(function(r){if(!r.ok) throw 0; return r.json();})
    .then(function(data){
      all = (data.shuls||[])
        .filter(function(s){return !s.error;})
        .sort(function(a,b){
          var aHas = a.schedule && a.schedule.Shabbos && ((a.schedule.Shabbos.shacharis&&a.schedule.Shabbos.shacharis.length)||(a.schedule.Shabbos.mincha&&a.schedule.Shabbos.mincha.length));
          var bHas = b.schedule && b.schedule.Shabbos && ((b.schedule.Shabbos.shacharis&&b.schedule.Shabbos.shacharis.length)||(b.schedule.Shabbos.mincha&&b.schedule.Shabbos.mincha.length));
          if(aHas && !bHas) return -1; if(!aHas && bHas) return 1;
          return (a.name||'').localeCompare(b.name||'');
        });
      renderShuls(all);
    })
    .catch(function(){
      grid.innerHTML = '<div class="empty">Shul schedules will load here once the weekly data is generated. Check back shortly.</div>';
    });
})();
</script>
