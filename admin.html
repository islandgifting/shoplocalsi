<style>

/* ─── EXACT HEADER MOCKUP ─── */
.emstrip{background:var(--red);padding:.38rem 2rem;display:flex;justify-content:center;align-items:center;gap:1.25rem;flex-wrap:wrap;font-size:.68rem;font-weight:600;letter-spacing:.2px}
.emstrip a{color:rgba(255,255,255,.92)}.emstrip a:hover{color:#fff}
.emstrip .sep{color:rgba(255,255,255,.35)}.emstrip .em-label{color:rgba(255,255,255,.6);font-size:.62rem;letter-spacing:1px;text-transform:uppercase}

.top-bar{background:#0d2137;padding:.42rem 2.5rem;display:flex;align-items:center;justify-content:space-between;font-size:.7rem}
.top-bar-tagline{color:rgba(255,255,255,.9);text-align:center;flex:1;text-transform:uppercase;letter-spacing:2px;font-weight:700;font-size:.65rem}
.top-bar-right{display:flex;gap:1rem;align-items:center;flex-shrink:0}
.top-bar-right a{color:rgba(255,255,255,.7);font-size:.75rem;transition:color .2s;text-decoration:none}.top-bar-right a:hover{color:#fff}

nav{
  background:#fff;
  border-bottom:1px solid #dde4ea;
  padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:88px;
  position:sticky;top:0;z-index:999;
  box-shadow:0 2px 16px rgba(11,31,58,.07);
}

/* LOGO - exactly like mockup: circle left, text right of circle */
.logo-wrap{display:flex;align-items:center;gap:.85rem;text-decoration:none;flex-shrink:0}
.logo-img{height:70px;width:70px;object-fit:contain}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-wordmark{display:flex;align-items:baseline;gap:.2rem;line-height:1}
.logo-shop{font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:800;color:#0b1f3a;letter-spacing:1px;text-transform:uppercase}
.logo-local-word{font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:800;color:#3e7c59;letter-spacing:1px;text-transform:uppercase}
.logo-divider-row{display:flex;align-items:center;gap:.4rem;margin:.1rem 0 .15rem}
.logo-dash{width:18px;height:2px;background:#0b1f3a;opacity:.4;flex-shrink:0}
.logo-staten{font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:700;color:#0b1f3a;letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}
.logo-url{font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:600;color:#2c6e9e;letter-spacing:.5px}

/* NAV LINKS - small, spaced, uppercase, green underline on active */
.nav-links{display:flex;align-items:center;gap:0;list-style:none;margin:0 .5rem}
.nav-links a{
  font-family:'Montserrat',sans-serif;
  font-size:.72rem;font-weight:600;color:#1a2a3a;
  letter-spacing:.6px;text-transform:uppercase;
  padding:.5rem .75rem;position:relative;transition:color .2s;
  text-decoration:none;white-space:nowrap;
}
.nav-links a:hover{color:#3e7c59}
.nav-links a.active{color:#3e7c59}
.nav-links a.active::after{
  content:'';position:absolute;
  bottom:-2px;left:.75rem;right:.75rem;
  height:2px;background:#3e7c59;border-radius:1px;
}

/* GREEN PILL - "LIST YOUR BUSINESS" */
.nav-cta{
  background:#3e7c59 !important;color:#fff !important;
  padding:.48rem 1.1rem !important;border-radius:50px !important;
  font-weight:700 !important;font-size:.7rem !important;
  letter-spacing:.3px !important;transition:background .2s !important;
  white-space:nowrap;text-decoration:none;
}
.nav-cta:hover{background:#4a9469 !important}
.nav-cta::after{display:none !important}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{width:22px;height:2px;background:#0b1f3a;display:block}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
header{background:#0a1c4b;color:#fff;padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.2rem;font-weight:800}
header span{font-size:.82rem;color:rgba(255,255,255,.9)}
.container{max-width:960px;margin:2rem auto;padding:0 1.5rem}

/* LOGIN */
.login-box{background:#fff;border-radius:14px;padding:2.5rem;max-width:400px;margin:4rem auto;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.login-box h2{color:#0a1c4b;margin-bottom:1.5rem;font-size:1.3rem}
.login-box input{width:100%;padding:.8rem 1rem;border:2px solid #dde2ee;border-radius:8px;font-size:1rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:#0a1c4b}
.login-box button{width:100%;background:#0a1c4b;color:#fff;border:none;padding:.9rem;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer}
.error-msg{color:#cc2222;font-size:.82rem;margin-top:.5rem}

/* TABS */
.tabs{display:flex;gap:0;background:#fff;border-radius:12px;border:1px solid #dde2ee;overflow:hidden;margin-bottom:1.5rem}
.tab{flex:1;padding:1rem;text-align:center;font-weight:700;font-size:.88rem;cursor:pointer;color:#64748b;border-right:1px solid #dde2ee;transition:all .2s;position:relative}
.tab:last-child{border-right:none}
.tab.active{background:#0a1c4b;color:#fff}
.tab-badge{background:#cc2222;color:#fff;font-size:.65rem;font-weight:800;padding:.1rem .4rem;border-radius:10px;margin-left:.35rem}

/* STATS */
.stats-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat-pill{background:#fff;border-radius:10px;padding:.75rem 1.25rem;font-size:.88rem;font-weight:700;border:1px solid #dde2ee;text-align:center}
.stat-pill span{color:#0a1c4b;font-size:1.4rem;display:block}

/* FILTERS */
.filters{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{padding:.45rem 1rem;border:2px solid #dde2ee;border-radius:20px;background:#fff;font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:#0a1c4b;color:#fff;border-color:#0a1c4b}

/* LISTING CARDS */
.listing-card{background:#fff;border-radius:12px;border:1px solid #dde2ee;padding:1.5rem;margin-bottom:1rem;display:flex;gap:1.25rem;align-items:flex-start}
.listing-card.pending{border-left:4px solid #d4a843}
.listing-card.approved{border-left:4px solid #2a9d5c}
.listing-card.rejected{border-left:4px solid #cc2222;opacity:.6}
.listing-card.active{border-left:4px solid #2a9d5c}
.listing-info{flex:1}
.listing-title{font-weight:700;font-size:1rem;color:#0a1c4b;margin-bottom:.25rem}
.listing-meta{font-size:.8rem;color:#64748b;margin-bottom:.5rem}
.listing-desc{font-size:.85rem;color:#1a1a2e;line-height:1.5}
.listing-contact{font-size:.82rem;color:#0a1c4b;font-weight:600;margin-top:.4rem}
.listing-actions{display:flex;flex-direction:column;gap:.5rem;min-width:110px}
.btn-approve{background:#2a9d5c;color:#fff;border:none;padding:.6rem 1rem;border-radius:7px;font-weight:700;font-size:.82rem;cursor:pointer}
.btn-approve:hover{background:#1e7a46}
.btn-reject{background:#fff;color:#cc2222;border:2px solid #cc2222;padding:.6rem 1rem;border-radius:7px;font-weight:700;font-size:.82rem;cursor:pointer}
.btn-reject:hover{background:#cc2222;color:#fff}
.status-badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-pending{background:#fff8e1;color:#b8860b}
.badge-approved{background:#e8f8ee;color:#1a6b35}
.badge-rejected{background:#fff0f0;color:#cc2222}
.badge-active{background:#e8f8ee;color:#1a6b35}
.badge-inactive{background:#f4f6fb;color:#64748b}

/* AD CARDS */
.ad-card{background:#fff;border-radius:12px;border:1px solid #dde2ee;margin-bottom:1.25rem;overflow:hidden}
.ad-card.pending{border-left:4px solid #d4a843}
.ad-card.active{border-left:4px solid #2a9d5c}
.ad-card.inactive{border-left:4px solid #64748b;opacity:.7}
.ad-card-header{padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.ad-card-title{font-weight:700;font-size:1rem;color:#0a1c4b}
.ad-card-meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.ad-preview-wrap{padding:0 1.5rem 1rem}
.ad-preview-label{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.ad-banner-preview{width:100%;border-radius:8px;overflow:hidden;border:1px solid #dde2ee}
.ad-banner-preview iframe{width:100%;height:160px;border:none;display:block}
.ad-card-actions{padding:.75rem 1.5rem 1.25rem;display:flex;gap:.5rem;flex-wrap:wrap}

/* MESSAGES */
.messages-section{background:#f8faff;border-radius:8px;padding:1rem;margin:.75rem 1.5rem;font-size:.82rem}
.messages-section h4{color:#0a1c4b;font-weight:700;margin-bottom:.5rem;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
.message-item{padding:.5rem 0;border-bottom:1px solid #dde2ee;color:#1a1a2e;line-height:1.5}
.message-item:last-child{border-bottom:none}

.empty{text-align:center;padding:3rem;color:#64748b;font-size:.95rem}
.loading{text-align:center;padding:3rem;color:#64748b}
#loginSection{display:block}
#adminSection{display:none}
</style>

<body>

<header>
  <h1>⚙️ ShopLocal SI — Admin</h1>
  <span id="adminLabel"></span>
</header>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Log In</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminSection">
  <div class="container">

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('listings',this)">🛍 Marketplace <span class="tab-badge" id="listingsBadge">0</span></div>
      <div class="tab" onclick="switchTab('ads',this)">📢 Ad Submissions <span class="tab-badge" id="adsBadge">0</span></div>
      <div class="tab" onclick="switchTab('jobs',this)">💼 Jobs <span class="tab-badge" id="jobsBadge">0</span></div>
      <div class="tab" onclick="switchTab('realty',this)">🏠 Realty <span class="tab-badge" id="realtyBadge">0</span></div>
      <div class="tab" onclick="switchTab('simcha',this)">🎉 Simchos <span class="tab-badge" id="simchaBadge">0</span></div>
    </div>

    <!-- MARKETPLACE TAB -->
    <div id="tabListings">
      <div class="stats-bar">
        <div class="stat-pill"><span id="countPending">—</span>Pending</div>
        <div class="stat-pill"><span id="countApproved">—</span>Approved</div>
        <div class="stat-pill"><span id="countRejected">—</span>Rejected</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this,'listings')">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this,'listings')">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('Approved',this,'listings')">✅ Approved</button>

      </div>
      <div id="listingsContainer"><div class="loading">Loading…</div></div>
    </div>

    <!-- ADS TAB -->
    <div id="tabAds" style="display:none">
      <div class="stats-bar">
        <div class="stat-pill"><span id="countAdsPending">—</span>Pending</div>
        <div class="stat-pill"><span id="countAdsActive">—</span>Active</div>
        <div class="stat-pill"><span id="countAdsInactive">—</span>Inactive</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this,'ads')">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this,'ads')">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('Active',this,'ads')">✅ Active</button>
        <button class="filter-btn" onclick="setFilter('Inactive',this,'ads')">⏸ Inactive</button>

    <div id="tabJobs" style="display:none">
      <div class="stats-bar">
        <div class="stat-pill"><span id="countJobsPending">—</span>Pending</div>
        <div class="stat-pill"><span id="countJobsActive">—</span>Active</div>
        <div class="stat-pill"><span id="countJobsRejected">—</span>Rejected</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this,'jobs')">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this,'jobs')">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('Active',this,'jobs')">✅ Active</button>
        <button class="filter-btn" onclick="setFilter('Rejected',this,'jobs')">❌ Rejected</button>
      </div>

    <!-- REALTY TAB -->
    <div id="tabRealty" style="display:none">

        <div class="stat-pill"><span id="countRealtyPending">—</span>Pending</div>

        <div class="stat-pill"><span id="countRealtyRejected">—</span>Rejected</div>
      </div>

        <button class="filter-btn active" onclick="setFilter('all',this,'realty')">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this,'realty')">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('Active',this,'realty')">✅ Active</button>
        <button class="filter-btn" onclick="setFilter('Rejected',this,'realty')">❌ Rejected</button>
      </div>
      <div id="realtyContainer"><div class="loading">Loading…</div></div>
    </div>

    <!-- SIMCHA TAB -->
    <div id="tabSimcha" style="display:none">
      <div class="stats-bar">
        <div class="stat-pill"><span id="countSimchaPending">—</span>Pending</div>
        <div class="stat-pill"><span id="countSimchaApproved">—</span>Approved</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this,'simcha')">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this,'simcha')">⏳ Pending</button>
        <button class="filter-btn" onclick="setFilter('Approved',this,'simcha')">✅ Approved</button>
      </div>
      <div id="simchaContainer"><div class="loading">Loading…</div></div>

  </div>

<script>
const TOKEN = 'pattpepVsrciRn5To.2f3666388d8f882b39c8a734ed05add6f746f3fa0cd9c20ca38155f00eaf9d87';
const BASE = 'appyNDNuwGFgR44sg';
const LISTINGS_TABLE = 'tblBt9FfVcrMK1aOs';

let adminPassword = '';
let allListings = [], allAds = [], allSimchos = [], allJobs = [], allRealty = [];
let listingsFilter = 'all', adsFilter = 'all', simchaFilter = 'all', jobsFilter = 'all', realtyFilter = 'all';
let currentTab = 'listings';

// ── LOGIN ──
async function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;
  try {
    const res = await fetch('/.netlify/functions/approve-listing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, id: 'test', status: 'test' })
    });
    if (res.status === 401) { document.getElementById('loginError').textContent = 'Wrong password.'; return; }
    adminPassword = pwd;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    document.getElementById('adminLabel').textContent = 'Admin';
    loadAll();
  } catch(e) { document.getElementById('loginError').textContent = 'Connection error.'; }
}

async function loadAll() {
  await Promise.all([loadListings(), loadAds(), loadJobs(), loadRealty()]);
}

// ── TABS ──
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabListings').style.display = tab === 'listings' ? 'block' : 'none';
  document.getElementById('tabAds').style.display = tab === 'ads' ? 'block' : 'none';
  document.getElementById('tabJobs').style.display = tab === 'jobs' ? 'block' : 'none';
  document.getElementById('tabRealty').style.display = tab === 'realty' ? 'block' : 'none';
  document.getElementById('tabSimcha').style.display = tab === 'simcha' ? 'block' : 'none';
  if (tab === 'simcha' && allSimchos.length === 0) loadSimchos();
}

// ── LISTINGS ──
async function loadListings() {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/${LISTINGS_TABLE}?sort[0][field]=Submitted&sort[0][direction]=desc`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    allListings = (data.records || []).map(r => ({
      id: r.id,
      title: r.fields.Title || '(no title)',
      price: r.fields.Price || '',
      category: r.fields.Category || '',
      contact: r.fields.Contact || '',
      description: r.fields.Description || '',
      submitted: r.fields.Submitted || '',
      status: r.fields.Status || 'Pending',
      messages: r.fields.Messages || ''
    }));
    const pending = allListings.filter(l => l.status === 'Pending').length;
    document.getElementById('listingsBadge').textContent = pending;
    document.getElementById('countPending').textContent = pending;
    document.getElementById('countApproved').textContent = allListings.filter(l => l.status === 'Approved').length;
    document.getElementById('countRejected').textContent = allListings.filter(l => l.status === 'Rejected').length;
    renderListings();
  } catch(e) {
    document.getElementById('listingsContainer').innerHTML = '<div class="empty">Failed to load listings.</div>';
  }
}

function renderListings() {
  const filtered = listingsFilter === 'all' ? allListings : allListings.filter(l => l.status === listingsFilter);
  const container = document.getElementById('listingsContainer');
  if (!filtered.length) { container.innerHTML = '<div class="empty">No listings found.</div>'; return; }
  container.innerHTML = filtered.map(l => `
    <div class="listing-card ${l.status.toLowerCase()}" id="card-${l.id}">
      <div class="listing-info">
        <div class="listing-title">${l.title} <span class="status-badge badge-${l.status.toLowerCase()}">${l.status}</span></div>
        <div class="listing-meta">📦 ${l.category} · 💰 ${l.price} · 📅 ${l.submitted}</div>
        <div class="listing-desc">${l.description}</div>
        <div class="listing-contact">📞 ${l.contact}</div>
        ${l.messages ? `<div style="margin-top:.5rem;font-size:.78rem;background:#f4f6fb;padding:.5rem .75rem;border-radius:6px;color:#64748b">💬 ${l.messages}</div>` : ''}
      </div>
      <div class="listing-actions">
        ${l.status !== 'Approved' ? `<button class="btn-approve" onclick="updateListing('${l.id}','Approved')">✅ Approve</button>` : ''}
        ${l.status !== 'Rejected' ? `<button class="btn-reject" onclick="updateListing('${l.id}','Rejected')">❌ Reject</button>` : ''}
      </div>
    </div>`).join('');
}

async function updateListing(id, status) {
  document.getElementById('card-' + id).style.opacity = '.4';
  try {
    await fetch('/.netlify/functions/approve-listing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status, adminPassword })
    });
    const l = allListings.find(x => x.id === id);
    if (l) l.status = status;
    document.getElementById('countPending').textContent = allListings.filter(l => l.status === 'Pending').length;
    document.getElementById('countApproved').textContent = allListings.filter(l => l.status === 'Approved').length;
    document.getElementById('countRejected').textContent = allListings.filter(l => l.status === 'Rejected').length;
    document.getElementById('listingsBadge').textContent = allListings.filter(l => l.status === 'Pending').length;
    renderListings();
  } catch(e) {
    document.getElementById('card-' + id).style.opacity = '1';
    alert('Failed. Try again.');
  }
}

// ── ADS ──
async function loadAds() {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/Ads?sort[0][field]=Created&sort[0][direction]=desc`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    allAds = (data.records || []).map(r => ({
      id: r.id,
      businessName: r.fields.BusinessName || '(no name)',
      adType: r.fields.AdType || 'Banner',
      description: r.fields.Description || '',
      phone: r.fields.Phone || '',
      link: r.fields.Link || '',
      tagline: r.fields.Tagline || '',
      color: r.fields.Color || '#0a1c4b',
      category: r.fields.Category || '',
      status: r.fields.Status || 'Pending',
      created: r.fields.Created || '',
      messages: r.fields.Messages || '',
      bannerHTML: r.fields.BannerHTML || ''
    }));
    const pending = allAds.filter(a => a.status === 'Pending').length;
    document.getElementById('adsBadge').textContent = pending;
    document.getElementById('countAdsPending').textContent = pending;
    document.getElementById('countAdsActive').textContent = allAds.filter(a => a.status === 'Active').length;
    document.getElementById('countAdsInactive').textContent = allAds.filter(a => a.status === 'Inactive').length;
    renderAds();
  } catch(e) {
    document.getElementById('adsContainer').innerHTML = '<div class="empty">Failed to load ads.</div>';
  }
}

function renderAds() {
  const filtered = adsFilter === 'all' ? allAds : allAds.filter(a => a.status === adsFilter);
  const container = document.getElementById('adsContainer');
  if (!filtered.length) { container.innerHTML = '<div class="empty">No ad submissions yet.</div>'; return; }

  container.innerHTML = filtered.map(a => `
    <div class="ad-card ${a.status.toLowerCase()}" id="adcard-${a.id}">

// ── JOBS ──
async function loadJobs() {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/Jobs`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('jobsContainer').innerHTML = '<div class="empty">Failed to load jobs: ' + ((data.error && data.error.message) || 'unknown error') + '</div>'; return; }
    allJobs = (data.records || []).map(r => ({
      id: r.id,
      title: r.fields.Title || '(no title)',
      type: r.fields.Type || '',
      category: r.fields.Category || '',
      description: r.fields.Description || '',
      pay: r.fields.Pay || '',
      phone: r.fields.Phone || '',
      email: r.fields.Email || '',
      status: r.fields.Status || 'Pending',
      submitted: r.fields.Submitted || ''
    })).sort((a, b) => (b.submitted || '').localeCompare(a.submitted || ''));
    const pending = allJobs.filter(j => j.status === 'Pending').length;
    document.getElementById('jobsBadge').textContent = pending;
    document.getElementById('countJobsPending').textContent = pending;
    document.getElementById('countJobsActive').textContent = allJobs.filter(j => j.status === 'Active').length;
    document.getElementById('countJobsRejected').textContent = allJobs.filter(j => j.status === 'Rejected').length;
    renderJobs();
  } catch(e) {
    document.getElementById('jobsContainer').innerHTML = '<div class="empty">Failed to load jobs.</div>';
  }
}

function renderJobs() {
  const filtered = jobsFilter === 'all' ? allJobs : allJobs.filter(j => j.status === jobsFilter);
  const container = document.getElementById('jobsContainer');
  if (!filtered.length) { container.innerHTML = '<div class="empty">No job postings found.</div>'; return; }
  container.innerHTML = filtered.map(j => `
    <div class="listing-card ${j.status.toLowerCase()}" id="jobcard-${j.id}">
      <div class="listing-info">
        <div class="listing-title">${j.title} <span class="status-badge badge-${j.status.toLowerCase()}">${j.status}</span></div>
        <div class="listing-meta">${j.type === 'Wanted' ? '🙋 Job Wanted' : '💼 Job Available'} · 📦 ${j.category} · 💰 ${j.pay || 'n/a'} · 📅 ${j.submitted}</div>
        <div class="listing-desc">${j.description}</div>
        <div class="listing-contact">📞 ${j.phone}${j.email ? ' · ✉️ ' + j.email : ''}</div>
      </div>
      <div class="listing-actions">
        ${j.status !== 'Active' ? `<button class="btn-approve" onclick="updateJob('${j.id}','Active')">✅ Approve & Go Live</button>` : ''}
        ${j.status !== 'Rejected' ? `<button class="btn-reject" onclick="updateJob('${j.id}','Rejected')">❌ Reject</button>` : ''}
      </div>
    </div>`).join('');
}

// ── SIMCHOS ──
async function loadSimchos() {
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/Simchos?sort[0][field]=Submitted&sort[0][direction]=desc`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    allSimchos = (data.records || []).map(r => ({
      id: r.id,
      type: r.fields.Type || '',
      families: r.fields.Families || '',
      message: r.fields.Message || '',
      date: r.fields.Date || '',
      postedBy: r.fields.PostedBy || '',
      status: r.fields.Status || 'Pending',
      submitted: r.fields.Submitted || ''
    }));
    document.getElementById('countSimchaPending').textContent = allSimchos.filter(s => s.status === 'Pending').length;
    document.getElementById('countSimchaApproved').textContent = allSimchos.filter(s => s.status === 'Approved').length;
    document.getElementById('simchaBadge').textContent = allSimchos.filter(s => s.status === 'Pending').length;
    renderSimchos();
  } catch(e) {
    document.getElementById('simchaContainer').innerHTML = '<div class="loading">Error loading simchos.</div>';
  }
}

function setFilter(val, btn, tab) {
  if (tab === 'listings') { listingsFilter = val; renderListings(); }
  else if (tab === 'ads') { adsFilter = val; renderAds(); }
  else if (tab === 'jobs') { jobsFilter = val; renderJobs(); }
  else if (tab === 'realty') { realtyFilter = val; renderRealty(); }
  else if (tab === 'simcha') { simchaFilter = val; renderSimchos(); }
  btn.closest('.filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function renderSimchos() {
  const filtered = simchaFilter === 'all' ? allSimchos : allSimchos.filter(s => s.status === simchaFilter);
  const container = document.getElementById('simchaContainer');
  if (!filtered.length) { container.innerHTML = '<div class="loading">No simchos found.</div>'; return; }
  const typeEmojis = {Wedding:'💒',Bar_Mitzvah:'📜','Bar Mitzvah':'📜',Bat_Mitzvah:'✡','Bat Mitzvah':'✡',Vort:'💍',Bris:'👶','Sheva Brachos':'🕯',Kiddush:'🍷',Aufruf:'📖',Graduation:'🎓',Event:'🎊'};
  container.innerHTML = filtered.map(s => `
    <div class="listing-card" id="simcha-${s.id}" style="border-left:4px solid ${s.status==='Approved'?'#2a9d5c':s.status==='Pending'?'#f59e0b':'#94a3b8'}">
      <div class="listing-header">
        <div>
          <div class="listing-title">${typeEmojis[s.type]||'🎉'} ${s.families}</div>
          <div class="listing-meta">${s.type} · Posted by ${s.postedBy} · ${s.submitted}</div>
        </div>
        <span class="listing-status" style="background:${s.status==='Approved'?'#e8f8ee':s.status==='Pending'?'#fff8e1':'#f4f6fb'};color:${s.status==='Approved'?'#1a6b35':s.status==='Pending'?'#92600a':'#64748b'}">${s.status}</span>
      </div>
      <div style="font-size:.88rem;color:#334155;line-height:1.6;margin:.75rem 0">${s.message}</div>
      ${s.date ? `<div style="font-size:.8rem;color:#64748b">📅 Event Date: ${s.date}</div>` : ''}
      <div class="ad-card-actions" style="margin-top:1rem">
        ${s.status !== 'Approved' ? `<button class="btn-approve" onclick="updateSimcha('${s.id}','Approved')">✅ Approve & Post</button>` : ''}
        ${s.status !== 'Rejected' ? `<button class="btn-reject" onclick="updateSimcha('${s.id}','Rejected')">❌ Reject</button>` : ''}
      </div>
    </div>`).join('');
}

async function updateSimcha(id, status) {
