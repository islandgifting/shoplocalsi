# Auto-updates shul minyan times from GoDaven every week.
# Place this file at: .github/workflows/update-shuls.yml
name: Update shul minyan times

on:
  schedule:
    # Every day at 5:00 AM Eastern (9:00 UTC) — daily, so shiva listings stay current
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab any time

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install playwright@1.49.0
          npx playwright install --with-deps chromium

      - name: Scrape GoDaven
        run: node scripts/scrape-godaven.mjs

      - name: Commit updated data
        run: |
          git config user.name "shul-times-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes this week."
          else
            git commit -m "Daily shul + community data update ($(date +%Y-%m-%d))"
            git push
          fi
